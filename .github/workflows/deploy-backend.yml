name: Deploy django app using sh file

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/superadmin/e-commerce
            bash deploy.sh
            # Apply any new DB migrations. deploy.sh has already pulled the new
            # code, so the migration files are present. Without this a pushed
            # migration never reaches the database and the app errors on the new
            # column/table (e.g. sp_items.source_warehouse -> 503 on save-draft).
            if [ -f venv/bin/activate ]; then . venv/bin/activate; elif [ -f .venv/bin/activate ]; then . .venv/bin/activate; fi
            python manage.py migrate --noinput