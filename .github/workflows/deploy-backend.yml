name: Deploy django app using sh file

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/superadmin/e-commerce
            bash deploy.sh
            # Best-effort DB migrate — activate the project venv if present, then
            # try python / python3. NEVER fail the deploy over it (deploy.sh has
            # already pulled the code and restarted the app); if it can't run,
            # migrations are applied by hand.
            if [ -f venv/bin/activate ]; then . venv/bin/activate;
            elif [ -f .venv/bin/activate ]; then . .venv/bin/activate;
            elif [ -f env/bin/activate ]; then . env/bin/activate; fi
            (python manage.py migrate --noinput || python3 manage.py migrate --noinput) || echo "WARNING: migrate did not run — apply pending migrations manually"